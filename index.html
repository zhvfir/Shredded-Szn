<!doctype html>
<html lang="en" style="background:#0D1117">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0D1117" />
    <!-- Resolve the saved theme before first paint so a light-mode launch
         doesn't flash the dark background. Mirrors src/theme.js. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem('cutlog-theme');
          if (p !== 'light' && p !== 'dark' && p !== 'auto') p = 'dark';
          var light = p === 'light' ||
            (p === 'auto' && window.matchMedia &&
             window.matchMedia('(prefers-color-scheme: light)').matches);
          var eff = light ? 'light' : 'dark';
          var bg = light ? '#EEF2F6' : '#0D1117';
          document.documentElement.dataset.theme = eff;
          document.documentElement.style.background = bg;
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', bg);
        } catch (e) {}
      })();
    </script>
    <title>Shredded Szn</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="./icon-512.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shredded Szn" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="./splash/1125x2436.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="./splash/1170x2532.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="./splash/1179x2556.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="./splash/1206x2622.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="./splash/1284x2778.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="./splash/1290x2796.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="./splash/1320x2868.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <!-- Splash: painted instantly, replaced when React mounts (no white flash).
           Background follows the theme; the logo carries its own dark tile, so
           border-radius makes it read as an app icon on the light background. -->
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);animation:sz-fade .4s ease">
        <img src="./logo.png" alt="Shredded Szn" style="width:62%;max-width:340px;height:auto;border-radius:22%" />
      </div>
    </div>
    <style>@keyframes sz-fade{from{opacity:0}to{opacity:1}}</style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
